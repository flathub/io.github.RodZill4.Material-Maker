app-id: io.github.RodZill4.Material-Maker
base: org.godotengine.godot.BaseApp
base-version: '4.6'
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: material-maker
rename-icon: icon
rename-appdata-file: io.github.RodZill4.Material-Maker.appdata.xml

finish-args:
  - --share=ipc
  - --socket=x11
  - --filesystem=home
  - --device=dri
  - --share=network

modules:

  - name: material-maker-pack
    buildsystem: simple

    sources:
      - type: archive
        sha256: 30e6b6d141f0cd5bebd629ad1d0ef1324e60091bb20662d026b402ba58c59937
        url: https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
      
      - type: archive
        sha256: aedf77f25da853a89f26cfbb1d73b32ebc37e41f5430e257f14aa96f1b4f8d3a
        url: https://github.com/RodZill4/material-maker/archive/refs/tags/1.6.tar.gz
        dest: material-maker

    build-commands:
    - ./Godot_v4.6.2-stable_linux.x86_64 --headless -v --path material-maker --export-pack "Linux/X11" material-maker.pck
    - install -Dm644 material-maker/material-maker.pck /app/bin/material-maker.pck

  - name: material-maker
    buildsystem: simple

    sources:
      - type: archive
        url: https://github.com/RodZill4/material-maker/releases/download/1.6/material_maker_1_6_linux.tar.gz
        sha256: c4673a964ef39b4a705bcafb55b5214ac2f966c995aef3efe5636a4036883c1e

      - type: script
        dest-filename: material_maker.sh
        commands:
          # `cd` is needed so that Material Maker can find its data directories.
          - cd /app/bin/
          # Use the `Dummy` audio driver to avoid error messages when starting the application from a terminal.
          - /app/bin/godot-runner --audio-driver Dummy --main-pack /app/bin/material-maker.pck "$@"

      - type: file
        url: https://github.com/RodZill4/material-maker/raw/1.6/icon.png
        sha256: 72ee1a0fc59b798b8849eb9bd0cb7b67fd9ee3ff41645f90c2ca98168f3619ef

      - type: file
        url: https://github.com/RodZill4/material-maker/raw/1.6/material_maker/misc/linux/io.github.RodZill4.Material-Maker.desktop
        sha256: 381e6425233d0aa3786c5583a2415d0d20b828481fa93dceac1e4376481d1330

      - type: file
        path: io.github.RodZill4.Material-Maker.appdata.xml

    build-commands:
      - install -Dm755 material_maker.sh /app/bin/material-maker
      - mv {examples,library,nodes,doc,environments,meshes,export}/ /app/bin/
      - install -Dm644 icon.png -t /app/share/icons/hicolor/256x256/apps/
      - install -Dm644 io.github.RodZill4.Material-Maker.desktop -t /app/share/applications/
      - install -Dm644 io.github.RodZill4.Material-Maker.appdata.xml -t /app/share/appdata/
